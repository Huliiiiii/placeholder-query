name: placeholder-query

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: placeholder_query
      POSTGRES_PASSWORD: placeholder_query
      POSTGRES_DB: placeholder_query
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placeholder_query -d placeholder_query"]
      interval: 2s
      timeout: 5s
      retries: 20
